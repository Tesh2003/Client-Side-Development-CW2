<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<link rel="stylesheet" href="CSS/feedback.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
.star-rating {
    direction: rtl;
    display: inline-block;
    cursor: pointer;
}

.star-rating input {
    display: none;
}

.star-rating label {
    color: #f7d980;
    font-size: 24px;
    padding: 0 2px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.star-rating label:hover,
.star-rating label:hover ~ label,
.star-rating input:checked ~ label {
    color: #d7b700;
}

.button.clicked {
    background-color: #6c63ff;
    color: white;
}
</style>

</head>

<body>

<!-- Video Background -->
<video autoplay loop muted playsinline class="video-background">
    <source src="resources/images/bg_3.mp4" type="video/mp4">
</video>

<div class="nav_bg">
    <nav>
        <ul>
            <li><a href="splashscreen.html">Splash Screen</a></li>
            <li><a href="Home.html">Home</a></li>
            <li><a href="accomplishments.html">Accomplishments</a></li>
            <li><a href="volunteer.html">Volunteer</a></li>
            <li><a href="Feedback.html">Feedback</a></li>
            <li><a href="Team.html">Team</a></li>
        </ul>
    </nav>
</div>

<!-- Feedback Form -->
<div class="feedback-container">
    <h2>Feedback Form</h2>
    <p>Please share your experience with us</p>

    <form onsubmit="submitFeedback(); return false;">

        <div class="input-group">
            <input type="text" required>
            <label>Name</label>
        </div>

        <div class="input-group">
            <input type="email" required>
            <label>Email</label>
        </div>

        <label>Was this your first time visiting our website?</label>
        <div class="button-group">
            <button type="button" class="button" id="yesButton1" onclick="toggleSelection(this, 'noButton1')">Yes</button>
            <button type="button" class="button" id="noButton1" onclick="toggleSelection(this, 'yesButton1')">No</button>
        </div>

        <label>Did you find our website helpful?</label>
        <div class="button-group">
            <button type="button" class="button" id="yesButton2" onclick="toggleSelection(this, 'noButton2')">Yes</button>
            <button type="button" class="button" id="noButton2" onclick="toggleSelection(this, 'yesButton2')">No</button>
        </div>

        <div class="input-group">
            <textarea rows="4" required></textarea>
            <label>Message</label>
        </div>

        <label>Rate your experience:</label>
        <div class="star-rating animated-stars">
            <input type="radio" id="star5" name="rating" value="5">
            <label for="star5" class="bi bi-star-fill"></label>

            <input type="radio" id="star4" name="rating" value="4">
            <label for="star4" class="bi bi-star-fill"></label>

            <input type="radio" id="star3" name="rating" value="3">
            <label for="star3" class="bi bi-star-fill"></label>

            <input type="radio" id="star2" name="rating" value="2">
            <label for="star2" class="bi bi-star-fill"></label>

            <input type="radio" id="star1" name="rating" value="1">
            <label for="star1" class="bi bi-star-fill"></label>
        </div>

        <p id="ratingValue"></p>

        <button type="submit">Submit</button>

    </form>
</div>

<script>
function toggleSelection(clickedButton, otherButtonId) {
    document.getElementById(otherButtonId).classList.remove('clicked');
    clickedButton.classList.add('clicked');
}

function submitFeedback() {
    alert("Thank you for your feedback!");
}

document.querySelectorAll('.star-rating label').forEach(star => {
    star.addEventListener('click', function() {
        this.style.transform = 'scale(1.2)';
        setTimeout(() => {
            this.style.transform = 'scale(1)';
        }, 200);
    });
});

document.querySelectorAll('input[name="rating"]').forEach(radio => {
    radio.addEventListener('change', function() {
        document.getElementById('ratingValue').textContent =
            "You selected " + this.value + " stars";
    });
});
</script>

</body>
</html>
